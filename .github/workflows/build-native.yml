name: Build native apps

# Manual: aba Actions do GitHub → "Build native apps" → "Run workflow".
# Builds só rodam quando disparadas à mão, pra não gastar minutos de CI
# em todo commit — o site/API continuam com deploy automático via
# Vercel/Render, isso aqui é só pras cascas nativas da Fase 8.
on:
  workflow_dispatch: {}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run sync --workspace apps/mobile
      # git no Windows não preserva o bit de execução do gradlew — reforça aqui
      # independente do que estiver commitado (ver update-index --chmod=+x).
      - run: chmod +x apps/mobile/android/gradlew
      # APK de debug, sem assinatura — suficiente pra instalar e testar num
      # aparelho. Pra publicar na Play Store precisa de build assinado (Fase 9).
      - working-directory: apps/mobile/android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: portal-do-psi-android-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk

  # AAB assinado — o formato que a Play Store exige pra publicação de verdade
  # (o job "android" acima gera só um APK de debug, pra sideload rápido).
  # Só roda se os 3 secrets abaixo existirem — sem eles, esse job falha rápido
  # em vez de gerar um AAB sem assinatura, o que a Play Store recusaria.
  android-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run sync --workspace apps/mobile
      - run: chmod +x apps/mobile/android/gradlew
      - name: Decodificar keystore de release
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.p12"
      - working-directory: apps/mobile/android
        run: ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      - uses: actions/upload-artifact@v4
        with:
          name: portal-do-psi-android-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build --workspace apps/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: portal-do-psi-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build --workspace apps/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: portal-do-psi-mac
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
